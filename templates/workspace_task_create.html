{% extends "workspace_base.html" %}
{% block title %}Assign Task — {{ org_name }}{% endblock %}
{% block content %}
<div class="ws-page">
  <div class="ws-wrap">
    <!-- Header -->
    <div class="ws-section ws-flex-between mb-24">
      <div>
        <div class="ws-eyebrow">
          <a href="{{ url_for('workspace.workspace_workers') }}" style="color:var(--text-muted);text-decoration:none">Workers</a>
          <span style="margin:0 6px;color:var(--text-muted)">›</span>
          <span>Assign Task</span>
        </div>
        <div class="ws-title">Assign New Task</div>
        <div class="ws-subtitle">{{ org_name }} — create and assign a task to a linked worker</div>
      </div>
   </span> </div>

    <!-- Form Card -->
    <div class="ws-card" style="max-width:600px">
      <div class="ws-card-b">
        <form method="POST" action="{{ url_for('workspace.workspace_task_create') }}">
          <input type="hidden" name="_csrf_token" value="{{ csrf_token }}"/>

          <div class="ws-form-group">
            <label class="ws-label">Worker <span style="color:var(--red)">*</span></label>
            <select name="worker_id" class="ws-select" required>
              <option value="">— Select a worker —</option>
              {% for w in workers %}
              <option value="{{ w.id }}">{{ w.display }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="ws-form-group">
            <label class="ws-label">Title <span style="color:var(--red)">*</span></label>
            <input type="text" name="title" class="ws-input" placeholder="e.g. Review moderation logs" required/>
          </div>

          <div class="ws-form-group">
            <label class="ws-label">Description</label>
            <textarea name="description" class="ws-input" rows="4" placeholder="Optional details about the task..."></textarea>
          </div>

          <div class="ws-form-group">
            <label class="ws-label">Priority</label>
            <select name="priority" class="ws-select">
              <option value="low" style="color:var(--text-muted)">🟢 Low</option>
              <option value="medium" selected style="color:var(--blue)">🔵 Medium</option>
              <option value="high" style="color:var(--orange)">🟠 High</option>
              <option value="critical" style="color:var(--red)">🔴 Critical</option>
            </select>
          </div>

          <div class="ws-form-group">
            <label class="ws-label">Due in X days</label>
            <input type="number" name="due_days" class="ws-input" min="1" max="365" placeholder="Leave blank for no deadline"/>
          </div>

          <div class="ws-flex gap-8" style="margin-top:24px">
            <button type="submit" class="ws-btn ws-btn-primary">Assign Task</button>
            <a href="{{ url_for('workspace.workspace_workers') }}" class="ws-btn">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
