{% extends "workspace_base.html" %}
{% block title %}SkillSync – Register Organisation{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-sm bg-[#111318] rounded-2xl border border-gray-800/60 p-8 glow">
    <div class="text-center mb-6">
      <span class="text-blue-400 text-3xl">⚡</span>
      <h1 class="text-white text-xl font-bold mt-2">Register Organisation</h1>
    </div>
    {% if error %}
    <div class="bg-red-900/30 border border-red-800/40 text-red-300 text-sm rounded-lg px-4 py-2 mb-4">{{ error }}</div>
    {% endif %}
    <form method="POST" class="space-y-3">
      <div>
        <label class="text-gray-400 text-xs uppercase tracking-wide">Organisation Name</label>
        <input type="text" name="org_name" required class="w-full bg-[#0b0d11] border border-gray-800 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500 transition" placeholder="Acme Inc">
      </div>
      <div>
        <label class="text-gray-400 text-xs uppercase tracking-wide">Slug (url-safe)</label>
        <input type="text" name="slug" required class="w-full bg-[#0b0d11] border border-gray-800 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500 transition" placeholder="acme">
      </div>
      <div>
        <label class="text-gray-400 text-xs uppercase tracking-wide">Your Name</label>
        <input type="text" name="name" required class="w-full bg-[#0b0d11] border border-gray-800 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500 transition" placeholder="Jane Doe">
      </div>
      <div>
        <label class="text-gray-400 text-xs uppercase tracking-wide">Email</label>
        <input type="email" name="email" required class="w-full bg-[#0b0d11] border border-gray-800 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500 transition" placeholder="jane@acme.com">
      </div>
      <div>
        <label class="text-gray-400 text-xs uppercase tracking-wide">Password</label>
        <input type="password" name="password" required class="w-full bg-[#0b0d11] border border-gray-800 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500 transition" placeholder="••••••••">
      </div>
      <div>
        <label class="text-gray-400 text-xs uppercase tracking-wide">Confirm Password</label>
        <input type="password" name="confirm" required class="w-full bg-[#0b0d11] border border-gray-800 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500 transition" placeholder="••••••••">
      </div>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-2.5 rounded-lg transition shadow-lg shadow-blue-600/20">Register</button>
    </form>
    <p class="text-gray-500 text-xs text-center mt-4">
      Already have an account? <a href="{{ url_for('workspace.workspace_login') }}" class="text-blue-400 hover:text-blue-300">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
