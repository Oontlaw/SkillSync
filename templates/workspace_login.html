{% extends "workspace_base.html" %}
{% block title %}SkillSync – Workspace Login{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm bg-[#111318] rounded-2xl border border-gray-800/60 p-8 glow">
    <div class="text-center mb-6">
      <span class="text-blue-400 text-3xl">⚡</span>
      <h1 class="text-white text-xl font-bold mt-2">Workspace Login</h1>
    </div>
    {% if error %}
    <div class="bg-red-900/30 border border-red-800/40 text-red-300 text-sm rounded-lg px-4 py-2 mb-4">{{ error }}</div>
    {% endif %}
    <form method="POST" class="space-y-4">
      <div>
        <label class="text-gray-400 text-xs uppercase tracking-wide">Organisation Slug</label>
        <input type="text" name="slug" required class="w-full bg-[#0b0d11] border border-gray-800 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500 transition" placeholder="my-org">
      </div>
      <div>
        <label class="text-gray-400 text-xs uppercase tracking-wide">Email</label>
        <input type="email" name="email" required class="w-full bg-[#0b0d11] border border-gray-800 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500 transition" placeholder="admin@example.com">
      </div>
      <div>
        <label class="text-gray-400 text-xs uppercase tracking-wide">Password</label>
        <input type="password" name="password" required class="w-full bg-[#0b0d11] border border-gray-800 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-blue-500 transition" placeholder="••••••••">
      </div>
      <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-2.5 rounded-lg transition shadow-lg shadow-blue-600/20">Sign In</button>
    </form>
    <div class="mt-4 pt-4 border-t border-gray-800/60">
      <a href="{{ url_for('workspace.workspace_magic_login') }}" class="block w-full text-center bg-gray-800 hover:bg-gray-700 text-gray-300 font-medium py-2 rounded-lg transition text-sm">Quick Login (Test Org)</a>
    </div>
    <p class="text-gray-500 text-xs text-center mt-4">
      No account? <a href="{{ url_for('workspace.workspace_register') }}" class="text-blue-400 hover:text-blue-300">Register your organisation</a>
    </p>
  </div>
</div>
{% endblock %}
