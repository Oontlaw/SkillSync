{% extends "workspace_base.html" %} {% block title %}SkillSync — Sign In{%
endblock %} {% block content %}
<div class="ws-auth">
    <div class="ws-auth-card">
        <div class="ws-auth-brand">SkillSync</div>
        <div class="ws-auth-sub">Workforce Intelligence — Workspace</div>

        {% if error %}
        <div class="ws-alert ws-alert-error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token }}" />
            <div class="ws-form-group">
                <label class="ws-label">Organisation Slug</label>
                <input
                    type="text"
                    name="slug"
                    class="ws-input"
                    placeholder="my-company"
                    required
                    autocomplete="organization"
                />
            </div>
            <div class="ws-form-group">
                <label class="ws-label">Email</label>
                <input
                    type="email"
                    name="email"
                    class="ws-input"
                    placeholder="admin@company.com"
                    required
                    autocomplete="email"
                />
            </div>
            <div class="ws-form-group" style="margin-bottom: 20px">
                <label class="ws-label">Password</label>
                <input
                    type="password"
                    name="password"
                    class="ws-input"
                    placeholder="••••••••"
                    required
                    autocomplete="current-password"
                />
            </div>
            <button
                type="submit"
                class="ws-btn ws-btn-primary"
                style="
                    width: 100%;
                    justify-content: center;
                    padding: 10px 14px;
                    font-size: 13px;
                "
            >
                Sign in
            </button>
        </form>

        <hr class="ws-divider" />
        <p
            style="
                text-align: center;
                font-size: 11px;
                color: var(--text-muted);
            "
        >
            No account?
            <a
                href="{{ url_for('workspace.workspace_register') }}"
                style="color: var(--text-sec)"
                >Register organisation</a
            >
        </p>
    </div>
</div>
{% endblock %}
